<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<title>DDD Healthcare Management System - Modern SAAS</title>
<style>
      /* Global styles */
      * {
        box-sizing: border-box;
      }
      
      body {
        margin: 0;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
          'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
          sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-color: #f8fafc;
      }
      
      /* Loading styles */
      .loading-container {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        flex-direction: column;
        gap: 24px;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 9999;
      }
      
      .loading-spinner {
        width: 60px;
        height: 60px;
        border: 4px solid rgba(255, 255, 255, 0.3);
        border-top: 4px solid white;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      
      .loading-content {
        text-align: center;
      }
      
      .loading-title {
        font-size: 24px;
        font-weight: 700;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        gap: 12px;
        justify-content: center;
      }
      
      .loading-subtitle {
        font-size: 16px;
        opacity: 0.9;
        font-weight: 400;
      }
      
      .loading-features {
        margin-top: 20px;
        font-size: 14px;
        opacity: 0.8;
        max-width: 300px;
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      
      .loading-container > * {
        animation: fadeIn 0.6s ease-out forwards;
      }
      
      .loading-container > *:nth-child(2) {
        animation-delay: 0.2s;
      }
      
      .loading-container > *:nth-child(3) {
        animation-delay: 0.4s;
      }
      
      /* Hide loading when app loads */
      #root:not(:empty) ~ .loading-container {
        display: none;
      }
      
      /* Embedded mode styles */
      body.embedded {
        overflow: hidden;
      }
      
      .embedded #root {
        height: 100vh;
        overflow: auto;
      }
    </style>
</head>
<body>
<div id="root"></div>
<!-- Loading indicator (shown until React loads) -->
<div class="loading-container">
<div class="loading-spinner"></div>
<div class="loading-content">
<div class="loading-title">
          🏥 DDD Healthcare System
        </div>
<div class="loading-subtitle">
          Modern Healthcare Management Platform
        </div>
<div class="loading-features">
          Loading interactive dashboards, real-time analytics, and comprehensive healthcare management tools...
        </div>
</div>
</div>
<!-- Embedding detection script -->
<script>
      // Check if running in iframe for embedding
      if (window.self !== window.top) {
        document.body.classList.add('embedded');
        
        // Handle embedding parameters
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const embedded = urlParams.get('embedded');
        
        if (token && embedded === 'true') {
          localStorage.setItem('embedToken', token);
          localStorage.setItem('isEmbedded', 'true');
        }
      }
    </script>
<script src="/src/main.jsx" type="module"></script>
</body>
</html>
